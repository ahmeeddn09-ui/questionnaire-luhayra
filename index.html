<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sondage Huile pour Barbe</title>

  <style>
    :root {
      --violet-fonce: #4A2A6B;
      --violet: #6624A8;
      --fond-page: #f7f6f6;
      --fond-carte: #ffffff;
      --texte: #222;
      --gris: #777;
      --bordure: #ddd;
      --erreur: #b00020;
    }

    * {
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      margin: 0;
      background: var(--fond-page);
      color: var(--texte);
      padding: 30px;
    }

    .container {
      max-width: 850px;
      margin: auto;
      background: var(--fond-carte);
      padding: 40px;
      border-radius: 22px;
      box-shadow: 0 10px 35px rgba(0, 0, 0, 0.12);
    }

    h1 {
      text-align: center;
      color: var(--violet-fonce);
      margin-bottom: 10px;
      font-size: 34px;
    }

    .sous-titre {
      text-align: center;
      color: var(--gris);
      margin-bottom: 35px;
    }

    .section {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: var(--violet-fonce);
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid var(--bordure);
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fafafa;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--violet);
      background: white;
    }

    .champ-erreur {
      border-color: var(--erreur) !important;
      background: #fff4f4 !important;
    }

    textarea {
      min-height: 130px;
      resize: vertical;
    }

    .ligne {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }

    .choix {
      display: grid;
      gap: 12px;
      margin-top: 10px;
    }

    .option {
      border: 2px solid var(--bordure);
      border-radius: 12px;
      padding: 13px;
      cursor: pointer;
      background: #fafafa;
      transition: 0.3s;
      font-weight: normal;
      color: var(--texte);
    }

    .option:hover {
      border-color: var(--violet);
      background: #f1eafa;
    }

    .option input {
      width: auto;
      margin-right: 10px;
    }

    .consentement {
      background: #f1eafa;
      border-left: 5px solid var(--violet);
      padding: 18px;
      border-radius: 12px;
    }

    .consentement label {
      color: var(--texte);
      font-weight: normal;
    }

    .consentement input {
      width: auto;
      margin-right: 10px;
    }

    .preview {
      margin-top: 15px;
      display: none;
    }

    .preview img {
      max-width: 220px;
      border-radius: 15px;
      border: 2px solid var(--violet);
    }

    button {
      width: 100%;
      padding: 16px;
      background: var(--violet-fonce);
      color: white;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 15px;
    }

    button:hover {
      background: var(--violet);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .merci {
      display: none;
      margin-top: 30px;
      padding: 25px;
      border-radius: 18px;
      background: #f1eafa;
      border-left: 6px solid var(--violet);
      text-align: center;
    }

    .merci h2 {
      color: var(--violet-fonce);
      margin-bottom: 10px;
    }

    .erreur {
      display: none;
      margin-top: 20px;
      color: var(--erreur);
      font-weight: bold;
      text-align: center;
      line-height: 1.5;
    }

    @media (max-width: 650px) {
      body {
        padding: 15px;
      }

      .container {
        padding: 25px;
      }

      .ligne {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 27px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Sondage Huile pour Barbe</h1>

    <p class="sous-titre">
      Merci de prendre quelques minutes pour donner ton avis sur notre huile pour barbe.
    </p>

    <form id="formulaire" enctype="multipart/form-data">

      <div class="ligne">
        <div class="section">
          <label for="prenom">Prénom</label>
          <input type="text" id="prenom" name="prenom" placeholder="Ex : Adam" required>
        </div>

        <div class="section">
          <label for="nom">Nom</label>
          <input type="text" id="nom" name="nom" placeholder="Ex : Diallo" required>
        </div>
      </div>

      <div class="section">
        <label for="age">Âge</label>
        <input type="number" id="age" name="age" placeholder="Ex : 25" min="16" max="100" required>
      </div>

      <div class="section consentement">
        <label>
          <input type="checkbox" id="consentement" name="consentement" value="Oui" required>
          J’accepte que mes réponses soient utilisées dans le cadre de ce sondage sur l’huile pour barbe.
        </label>
      </div>

      <div class="section">
        <label>Quel est ton type de peau ?</label>

        <div class="choix">
          <label class="option">
            <input type="radio" name="peau" value="Peau sèche" required>
            Peau sèche
          </label>

          <label class="option">
            <input type="radio" name="peau" value="Peau grasse">
            Peau grasse
          </label>

          <label class="option">
            <input type="radio" name="peau" value="Peau mixte">
            Peau mixte
          </label>

          <label class="option">
            <input type="radio" name="peau" value="Peau sensible">
            Peau sensible
          </label>

          <label class="option">
            <input type="radio" name="peau" value="Je ne sais pas">
            Je ne sais pas
          </label>
        </div>
      </div>

      <div class="section">
        <label>Longueur de la barbe</label>

        <div class="choix">
          <label class="option">
            <input type="radio" name="longueur" value="Courte" required>
            Courte
          </label>

          <label class="option">
            <input type="radio" name="longueur" value="Moyenne">
            Moyenne
          </label>

          <label class="option">
            <input type="radio" name="longueur" value="Longue">
            Longue
          </label>
        </div>
      </div>

      <div class="section">
        <label>Densité de la barbe</label>

        <div class="choix">
          <label class="option">
            <input type="radio" name="densite" value="Clairsemée" required>
            Clairsemée
          </label>

          <label class="option">
            <input type="radio" name="densite" value="Normale">
            Normale
          </label>

          <label class="option">
            <input type="radio" name="densite" value="Fournie">
            Fournie
          </label>
        </div>
      </div>

      <div class="section">
        <label>Texture de la barbe</label>

        <div class="choix">
          <label class="option">
            <input type="radio" name="texture" value="Lisse" required>
            Lisse
          </label>

          <label class="option">
            <input type="radio" name="texture" value="Ondulée">
            Ondulée
          </label>

          <label class="option">
            <input type="radio" name="texture" value="Bouclée">
            Bouclée
          </label>
        </div>
      </div>

      <div class="section">
        <label for="frequence">À quelle fréquence utilises-tu une huile pour barbe ?</label>

        <select id="frequence" name="frequence" required>
          <option value="">Choisir une réponse</option>
          <option value="Tous les jours">Tous les jours</option>
          <option value="Plusieurs fois par semaine">Plusieurs fois par semaine</option>
          <option value="Une fois par semaine">Une fois par semaine</option>
          <option value="Rarement">Rarement</option>
          <option value="Jamais">Jamais</option>
        </select>
      </div>

      <div class="section">
        <label for="photo">Ajouter une photo</label>
        <input type="file" id="photo" name="photo" accept="image/*">

        <div class="preview" id="preview">
          <p>Aperçu de la photo :</p>
          <img id="imagePreview" src="#" alt="Aperçu photo">
        </div>
      </div>

      <div class="section">
        <label for="avis">Avis / critique</label>
        <textarea id="avis" name="avis" placeholder="Donne ton avis sur la texture, l’odeur, l’efficacité, le packaging, etc." required></textarea>
      </div>

      <div class="section consentement">
        <label>
          <input type="checkbox" id="consentementTest" name="consentementTest" value="Oui" required>
          Je suis consentant de tester gratuitement cette huile à barbe en échange d’un flacon d’huile.
        </label>
      </div>

      <button type="submit" id="btnEnvoyer">Envoyer le questionnaire</button>
      <p class="erreur" id="messageErreur"></p>
    </form>

    <div class="merci" id="merci">
      <h2>Merci pour votre réponse !</h2>
      <p>Votre questionnaire a bien été envoyé à Luhayra.</p>
    </div>
  </div>

  <script>
    const formulaire = document.getElementById("formulaire");
    const prenomInput = document.getElementById("prenom");
    const nomInput = document.getElementById("nom");
    const avisInput = document.getElementById("avis");
    const photo = document.getElementById("photo");
    const preview = document.getElementById("preview");
    const imagePreview = document.getElementById("imagePreview");
    const merci = document.getElementById("merci");
    const btnEnvoyer = document.getElementById("btnEnvoyer");
    const messageErreur = document.getElementById("messageErreur");

    const motsVulgaires = [
      "abruti",
      "abrutie",
      "abrutis",
      "batard",
      "bâtard",
      "batarde",
      "bâtarde",
      "bdl",
      "bite",
      "bites",
      "bordel",
      "bouffon",
      "bouffonne",
      "btr",
      "chatte",
      "chattes",
      "chieur",
      "chieuse",
      "con",
      "connard",
      "connarde",
      "connards",
      "connasse",
      "connasses",
      "conne",
      "connes",
      "cons",
      "couille",
      "couilles",
      "crétin",
      "cretin",
      "cul",
      "débile",
      "debile",
      "encule",
      "enculé",
      "enculee",
      "enculée",
      "enculer",
      "enfoire",
      "enfoiré",
      "enfoiree",
      "enfoirée",
      "fdp",
      "ferme ta gueule",
      "fils de pute",
      "fille de pute",
      "ftg",
      "foutre",
      "gueule",
      "merde",
      "merdes",
      "nsm",
      "ntm",
      "nique",
      "nique ta mere",
      "nique ta mère",
      "niquer",
      "pd",
      "pétasse",
      "petasse",
      "pouffiasse",
      "ptn",
      "pute",
      "putes",
      "putain",
      "salaud",
      "salop",
      "salope",
      "salopes",
      "ta gueule",
      "tg",
      "va te faire foutre",
      "vaf",
      "vaff",
      "vtff",
      "zebi",
      "zb",
      "zbi",
      "asshole",
      "bitch",
      "fck",
      "fuck",
      "fuk",
      "motherfucker",
      "shit",
      "stfu",
      "wtf"
    ];

    const motsCompacts = [
      "putain",
      "ptn",
      "merde",
      "bordel",
      "fdp",
      "filsdepute",
      "filledepute",
      "encule",
      "enculer",
      "connard",
      "connasse",
      "batard",
      "batarde",
      "salope",
      "salopes",
      "petasse",
      "pouffiasse",
      "niquetamere",
      "tagueule",
      "fermetagueule",
      "tg",
      "ftg",
      "ntm",
      "nsm",
      "vtff",
      "vaff",
      "vaf",
      "zebi",
      "zbi",
      "zb",
      "fuck",
      "fck",
      "fuk",
      "shit",
      "bitch",
      "asshole",
      "motherfucker",
      "stfu",
      "wtf"
    ];

    function echapperRegex(texte) {
      return texte.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
    }

    function normaliserTexte(texte) {
      return (texte || "")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[@]/g, "a")
        .replace(/[0]/g, "o")
        .replace(/[1!|]/g, "i")
        .replace(/[3]/g, "e")
        .replace(/[4]/g, "a")
        .replace(/[5$]/g, "s")
        .replace(/[7]/g, "t")
        .replace(/[8]/g, "b");
    }

    function creerRegexMot(mot) {
      const motNormalise = normaliserTexte(mot).trim();
      const morceaux = motNormalise.split(/\s+/).map(echapperRegex);
      const motif = morceaux.join("[\\s\\W_]*");

      return new RegExp(`(^|[^a-z0-9])${motif}($|[^a-z0-9])`, "i");
    }

    function contientMotVulgaire(texte) {
      const contenuNormalise = normaliserTexte(texte);
      const contenuCompact = contenuNormalise.replace(/[^a-z0-9]/g, "");

      const trouveMotClassique = motsVulgaires.some(mot => {
        return creerRegexMot(mot).test(contenuNormalise);
      });

      const trouveMotCache = motsCompacts.some(mot => {
        const motCompact = normaliserTexte(mot).replace(/[^a-z0-9]/g, "");
        return contenuCompact.includes(motCompact);
      });

      return trouveMotClassique || trouveMotCache;
    }

    function verifierChampsInterdits() {
      const champs = [
        { element: prenomInput, nom: "prénom" },
        { element: nomInput, nom: "nom" },
        { element: avisInput, nom: "avis / critique" }
      ];

      const champsAvecErreur = [];

      champs.forEach(champ => {
        if (contientMotVulgaire(champ.element.value)) {
          champ.element.classList.add("champ-erreur");
          champsAvecErreur.push(champ.nom);
        } else {
          champ.element.classList.remove("champ-erreur");
        }
      });

      if (champsAvecErreur.length > 0) {
        messageErreur.textContent =
          "Impossible d’envoyer le questionnaire : le champ " +
          champsAvecErreur.join(", ") +
          " contient un mot interdit ou une abréviation vulgaire. Merci de le modifier.";
        messageErreur.style.display = "block";
        return false;
      }

      messageErreur.style.display = "none";
      messageErreur.textContent = "";
      return true;
    }

    prenomInput.addEventListener("input", verifierChampsInterdits);
    nomInput.addEventListener("input", verifierChampsInterdits);
    avisInput.addEventListener("input", verifierChampsInterdits);

    photo.addEventListener("change", function () {
      const fichier = this.files[0];

      if (fichier) {
        const lecteur = new FileReader();

        lecteur.onload = function (e) {
          imagePreview.src = e.target.result;
          preview.style.display = "block";
        };

        lecteur.readAsDataURL(fichier);
      } else {
        preview.style.display = "none";
      }
    });

    formulaire.addEventListener("submit", async function (event) {
      event.preventDefault();

      if (!verifierChampsInterdits()) {
        return;
      }

      const formData = new FormData(formulaire);

      btnEnvoyer.disabled = true;
      btnEnvoyer.textContent = "Envoi en cours...";

      const controleur = new AbortController();
      const delaiMaximum = setTimeout(() => {
        controleur.abort();
      }, 30000);

      try {
        const response = await fetch("/envoyer", {
          method: "POST",
          body: formData,
          signal: controleur.signal
        });

        clearTimeout(delaiMaximum);

        if (response.ok) {
          formulaire.style.display = "none";
          merci.style.display = "block";

          merci.scrollIntoView({
            behavior: "smooth"
          });
        } else {
          const texteErreur = await response.text();
          throw new Error(texteErreur || "Erreur lors de l’envoi du questionnaire.");
        }
      } catch (error) {
        clearTimeout(delaiMaximum);

        if (error.name === "AbortError") {
          messageErreur.textContent = "L’envoi prend trop de temps. Réessaie dans quelques secondes. Si le problème continue, vérifie les logs Render et le mot de passe d’application Gmail.";
        } else {
          messageErreur.textContent = error.message || "Impossible d’envoyer le questionnaire. Vérifie que Render est bien déployé et que les identifiants Gmail sont corrects.";
        }

        messageErreur.style.display = "block";
        btnEnvoyer.disabled = false;
        btnEnvoyer.textContent = "Envoyer le questionnaire";
      }
    });
  </script>

</body>
</html>
